<style>
    .pwd-toggle-btn {
        position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
        border: none; background: none; color: #6c757d; cursor: pointer;
    }
    .pwd-toggle-btn:hover { color: #0d6efd; }
    
    .pwd-strength-meter { height: 4px; background: #e9ecef; border-radius: 2px; margin-top: 5px; overflow: hidden; }
    .pwd-strength-bar { height: 100%; width: 0%; transition: width 0.3s; }
    .pwd-weak { width: 30%; background: #dc3545; }
    .pwd-medium { width: 60%; background: #ffc107; }
    .pwd-strong { width: 100%; background: #198754; }
</style>

<div class="modal fade" id="changePasswordModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 12px;">
            <div class="modal-header bg-light" style="border-radius: 12px 12px 0 0;">
                <h5 class="modal-title">
                    <i class="fas fa-key me-2 text-muted "></i>
                    <span class="fw-bold">Đổi mật khẩu</span>
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            
            <div class="modal-body p-4" >
                <form id="changePasswordForm">
                    <input type="hidden" id="cpUserId">

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Mật khẩu hiện tại <span class="text-danger">*</span></label>
                        <div class="position-relative">
                            <input type="password" class="form-control" id="cpCurrentPassword" required placeholder="Nhập mật khẩu đang sử dụng">
                            <button type="button" class="pwd-toggle-btn" onclick="togglePwdVisibility('cpCurrentPassword', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <hr class="my-3 border-secondary-subtle">

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Mật khẩu mới <span class="text-danger">*</span></label>
                        <div class="position-relative">
                            <input type="password" class="form-control" id="cpNewPassword" required placeholder="Ít nhất 8 ký tự" oninput="checkNewPwdStrength()">
                            <button type="button" class="pwd-toggle-btn" onclick="togglePwdVisibility('cpNewPassword', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Xác nhận mật khẩu mới <span class="text-danger">*</span></label>
                        <div class="position-relative">
                            <input type="password" class="form-control" id="cpConfirmPassword" required placeholder="Nhập lại mật khẩu mới">
                            <button type="button" class="pwd-toggle-btn" onclick="togglePwdVisibility('cpConfirmPassword', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
            
            <div class="modal-footer bg-light" style="border-radius: 0 0 12px 12px;">
                <button type="button" class="btn btn-info border" onclick="submitChangePassword()">
                    <i class="fas fa-save me-1"></i> Lưu thay đổi
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // Đảm bảo layout có thẻ này
    let changePassModalBS = null;

    document.addEventListener('DOMContentLoaded', () => {
        const el = document.getElementById('changePasswordModal');
        if(el) changePassModalBS = new bootstrap.Modal(el);
    });

    // Hàm mở Modal (Được gọi từ Navbar)
    function openChangePasswordModal(userId) {
        // Reset form
        document.getElementById("changePasswordForm").reset();
        document.getElementById("cpUserId").value = userId;
        
        changePassModalBS.show();
    }

    function togglePwdVisibility(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('i');
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove("fa-eye");
            icon.classList.add("fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.remove("fa-eye-slash");
            icon.classList.add("fa-eye");
        }
    }


    async function submitChangePassword() {
        const userId = document.getElementById("cpUserId").value;
        const currentPass = document.getElementById("cpCurrentPassword").value;
        const newPass = document.getElementById("cpNewPassword").value;
        const confirmPass = document.getElementById("cpConfirmPassword").value;

        // Validation Client-side
        if(!currentPass || !newPass || !confirmPass) {
            showMessage('warning', 'Thông báo', "Vui lòng điền đầy đủ tất cả các trường!");
            return;
        }


        if(newPass !== confirmPass) {
            showMessage('error', 'Lỗi', "Mật khẩu xác nhận không khớp!");
            return;
        }

        if(currentPass === newPass) {
            showMessage('warning', 'Thông báo', "Mật khẩu mới không được trùng với mật khẩu hiện tại!")
            return;
        }
        // --- SỬA ĐOẠN LẤY TOKEN Ở ĐÂY ---
        const metaTag = document.querySelector('meta[name="csrf-token"]');
        const csrfToken = metaTag ? metaTag.getAttribute('content') : ''; 

        if (!csrfToken) {
            showMessage('error', 'Lỗi', "Không tìm thấy CSRF Token, request có thể bị lỗi 400");
        }
        // --------------------------------

        // Gọi API
        try {
            const response = await fetch(`/users/${userId}/change-password`, {
                method: 'POST', // Hoặc PUT tùy Backend route của bạn
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken // Thêm dòng này
                },
                body: JSON.stringify({
                    current_password: currentPass,
                    new_password: newPass
                })
            });

            const data = await response.json();

            if (data.success) {
                showMessage('success', 'Thông báo', "Đổi mật khẩu thành công! Vui lòng đăng nhập lại.");
                changePassModalBS.hide();
                window.location.href = "/logout"; // Logout luôn cho bảo mật
            } else {
                showMessage('error', 'Lỗi', (data.message || "Không thể đổi mật khẩu"));
            }

        } catch (error) {
            console.error(error);
            showMessage('error', 'Lỗi', "Không thể kết nối đến máy chủ.");
        }
    }
</script>
