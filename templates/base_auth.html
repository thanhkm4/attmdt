<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Đăng nhập{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/color.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/sidebar.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // ===== CẤU HÌNH SWEETALERT2 CHUNG =====
    // Giúp các popup có style giống Bootstrap
    const Toast = Swal.mixin({
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true
    });

    // Hàm hiển thị thông báo đẹp ở giữa màn hình
    function showMessage(type, title, message) {
        Swal.fire({
            icon: type, // 'success', 'error', 'warning', 'info'
            title: title,
            text: message,
            confirmButtonText: 'Đóng',
            confirmButtonColor: '#fff', // Màu primary của bạn
            buttonsStyling: true,
            customClass: {
                confirmButton: 'btn btn-info border'
            }
        });
    }
    </script>
</head>

<body class="bg-light">

    <div class="container mt-5">
        
        <div class="row justify-content-center">
            <div class="col-md-6">
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show auto-dismiss" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
            </div>
        </div>

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Lấy tất cả các thông báo có class 'auto-dismiss'
            const alerts = document.querySelectorAll('.auto-dismiss');
            
            alerts.forEach(function(alertElement) {
                // Đặt thời gian chờ 5 giây (5000 milliseconds)
                setTimeout(function() {
                    // Sử dụng Bootstrap Alert Instance để đóng đúng chuẩn
                    const bsAlert = new bootstrap.Alert(alertElement);
                    bsAlert.close();
                }, 5000); 
            });
        });
    </script>
</body>
</html>
